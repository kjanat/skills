name: Cross-org dispatch
on:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v9
        env:
          APP_TOKEN: ${{ secrets.APP_TOKEN }}
        with:
          script: |
            const appOctokit = getOctokit(process.env.APP_TOKEN)
            await appOctokit.rest.repos.createDispatchEvent({
              owner: 'my-org',
              repo: 'service',
              event_type: 'deploy'
            })
